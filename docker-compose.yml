# Solo PostgreSQL (Milvus se ejecuta con standalone_embed.sh)

version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: rag_postgres
    environment:
      POSTGRES_DB: rag_chatbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: diganDar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:

